{% extends "base.html" %}
{% block title %}Nuevo Equipo{% endblock %}
{% block page_title %}Crear Nuevo Equipo{% endblock %}

{% block content %}
<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Código</label>
            <input type="text" name="codigo" class="form-input" placeholder="Ej: EQ-016" required>
        </div>
        <div class="form-group">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-input" placeholder="Nombre del equipo" required>
        </div>
        <div class="form-group">
            <label class="form-label">Tipo</label>
            <input type="text" name="tipo" class="form-input" placeholder="Ej: Compresor, Motor, Bomba" required>
        </div>
        <div class="form-group">
            <label class="form-label">Ubicación</label>
            <input type="text" name="ubicacion" class="form-input" placeholder="Ej: Planta A - Zona 1" required>
        </div>
        <div class="form-group">
            <label class="form-label">Fecha de Instalación</label>
            <input type="date" name="fecha_instalacion" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label">Estado</label>
            <select name="estado" class="form-select">
                <option value="operativo">Operativo</option>
                <option value="en mantenimiento">En Mantenimiento</option>
                <option value="fuera de servicio">Fuera de Servicio</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Crear Equipo</button>
            <a href="{{ url_for('lista_equipos') }}" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
