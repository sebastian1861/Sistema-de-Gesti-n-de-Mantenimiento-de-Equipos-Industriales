{% extends "base.html" %}
{% block title %}Editar {{ equipo.nombre }}{% endblock %}
{% block page_title %}Editar Equipo — {{ equipo.codigo }}{% endblock %}

{% block content %}
<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Código</label>
            <input type="text" class="form-input" value="{{ equipo.codigo }}" disabled>
        </div>
        <div class="form-group">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-input" value="{{ equipo.nombre }}">
        </div>
        <div class="form-group">
            <label class="form-label">Tipo</label>
            <input type="text" name="tipo" class="form-input" value="{{ equipo.tipo }}">
        </div>
        <div class="form-group">
            <label class="form-label">Ubicación</label>
            <input type="text" name="ubicacion" class="form-input" value="{{ equipo.ubicacion }}">
        </div>
        <div class="form-group">
            <label class="form-label">Fecha de Instalación</label>
            <input type="date" name="fecha_instalacion" class="form-input" value="{{ equipo.fecha_instalacion }}">
        </div>
        <div class="form-group">
            <label class="form-label">Estado</label>
            <select name="estado" class="form-select">
                <option value="operativo" {% if equipo.estado == 'operativo' %}selected{% endif %}>Operativo</option>
                <option value="en mantenimiento" {% if equipo.estado == 'en mantenimiento' %}selected{% endif %}>En Mantenimiento</option>
                <option value="fuera de servicio" {% if equipo.estado == 'fuera de servicio' %}selected{% endif %}>Fuera de Servicio</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            <a href="{{ url_for('lista_equipos') }}" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
